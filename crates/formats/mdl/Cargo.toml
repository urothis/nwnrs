[package]
name = "nwnrs-mdl"
version.workspace = true
edition.workspace = true
publish = true
license.workspace = true
description = "Neverwinter Nights MDL parser, scene lowering, and resource resolution"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/nwnrs-mdl"
readme = "README.md"

[dependencies]
nwnrs-gff.workspace = true
nwnrs-resman.workspace = true
nwnrs-resref.workspace = true
nwnrs-restype.workspace = true
nwnrs-twoda.workspace = true
tracing.workspace = true

[dev-dependencies]
nwnrs-resmemfile = { path = "../../resources/resmemfile" }
nwnrs-test-support = { path = "../../foundation/test-support" }

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = [
    "-Zunstable-options",
    "--generate-link-to-definition",
    "--generate-macro-expansion",
]
