[package]
name = "nwnrs-git"
version.workspace = true
edition.workspace = true
publish = true
license.workspace = true
description = "Typed parser for Neverwinter Nights area instance GIT resources"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/nwnrs-git"
readme = "README.md"

[dependencies]
nwnrs-gff.workspace = true
nwnrs-resman.workspace = true
nwnrs-resref.workspace = true
nwnrs-restype.workspace = true
tracing.workspace = true

[dev-dependencies]
nwnrs-resmemfile = { path = "../../resources/resmemfile" }

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = [
    "-Zunstable-options",
    "--generate-link-to-definition",
    "--generate-macro-expansion",
]
