[package]
name = "nwnrs-io"
version.workspace = true
edition.workspace = true
publish = true
license.workspace = true
description = "Shared binary IO, endian, and invariant helpers for Neverwinter Nights crates"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/nwnrs-io"
readme = "README.md"

[dependencies]
serde.workspace = true
tracing.workspace = true

[dev-dependencies]
nwnrs-checksums = { path = "../checksums" }
nwnrs-compressedbuf = { path = "../../formats/compressedbuf" }
nwnrs-erf = { path = "../../formats/erf" }
nwnrs-exo = { path = "../../formats/exo" }
nwnrs-gff = { path = "../../formats/gff" }
nwnrs-ssf = { path = "../../formats/ssf" }
nwnrs-test-support = { path = "../test-support" }
nwnrs-tlk = { path = "../../formats/tlk" }
nwnrs-twoda = { path = "../../formats/twoda" }
reqwest.workspace = true
tokio.workspace = true
md5.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = [
    "-Zunstable-options",
    "--generate-link-to-definition",
    "--generate-macro-expansion",
]
