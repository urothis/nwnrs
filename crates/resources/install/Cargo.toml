[package]
name = "nwnrs-install"
version.workspace = true
edition.workspace = true
publish = true
license.workspace = true
description = "Neverwinter Nights install discovery and default resource-manager setup"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/nwnrs-install"
readme = "README.md"

[dependencies]
nwnrs-erf.workspace = true
nwnrs-key.workspace = true
nwnrs-resman.workspace = true
nwnrs-resdir.workspace = true
nwnrs-resnwsync.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[dev-dependencies]
nwnrs-checksums = { path = "../../foundation/checksums" }
nwnrs-compressedbuf = { path = "../../formats/compressedbuf" }
nwnrs-exo = { path = "../../formats/exo" }
nwnrs-resref = { path = "../resref" }
nwnrs-restype = { path = "../restype" }
rusqlite.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
rustdoc-args = [
    "-Zunstable-options",
    "--generate-link-to-definition",
    "--generate-macro-expansion",
]
