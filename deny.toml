# cargo-deny configuration for nwn1ee.types.rs
# See https://embarkstudios.github.io/cargo-deny/ for more information

[bans]
# The lint level for duplicate dependencies
multiple-versions = "deny"

[licenses]
# List of explicitly allowed licenses
allow = [
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[sources]
# Allow crates from crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
