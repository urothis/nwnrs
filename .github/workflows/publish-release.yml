name: Publish Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    id-token: write

env:
    CARGO_TERM_COLOR: always

jobs:
    publish:
        name: Publish Workspace Crates
        runs-on: ubuntu-latest
        environment: release
        steps:
            - uses: actions/checkout@v6.0.2
              with:
                  ref: ${{ github.ref }}

            - name: Setup Rust
              uses: ./.github/actions/setup-rust

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Verify tag matches workspace version
              run: |
                  version="$(python scripts/release.py version)"
                  expected_tag="v${version}"

                  if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
                      echo "Tag ${GITHUB_REF_NAME} does not match workspace version ${expected_tag}." >&2
                      exit 1
                  fi

            - name: Authenticate with crates.io
              id: auth
              uses: rust-lang/crates-io-auth-action@v1

            - name: Publish crates
              env:
                  CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
              run: |
                  version="$(python scripts/release.py version)"
                  python scripts/release.py publish-order > /tmp/publish-order.txt

                  while IFS= read -r crate_name; do
                      if python scripts/release.py is-published "${crate_name}" "${version}"; then
                          echo "Skipping ${crate_name} ${version}; already published."
                          continue
                      fi

                      attempt=1
                      until cargo publish -p "${crate_name}" --locked; do
                          if [ "${attempt}" -ge 10 ]; then
                              echo "Failed to publish ${crate_name} ${version} after ${attempt} attempts." >&2
                              exit 1
                          fi

                          attempt="$((attempt + 1))"
                          sleep 30
                      done
                  done < /tmp/publish-order.txt
