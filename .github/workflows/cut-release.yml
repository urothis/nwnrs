name: Cut Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: Semver component to increment
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major
            commit:
                description: Commit SHA or ref on the default branch to release from
                required: true
                type: string

permissions:
    contents: write
    id-token: write

env:
    CARGO_TERM_COLOR: always

jobs:
    cut-release:
        name: Cut Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2
              with:
                  ref: ${{ github.event.repository.default_branch }}
                  fetch-depth: 0

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Resolve and validate release commit
              env:
                  TARGET_REF: ${{ inputs.commit }}
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
              run: |
                  git fetch --tags origin "${DEFAULT_BRANCH}"
                  target_sha="$(git rev-parse "${TARGET_REF}^{commit}")"
                  default_sha="$(git rev-parse "origin/${DEFAULT_BRANCH}^{commit}")"

                  if [ "${target_sha}" != "${default_sha}" ]; then
                      echo "Requested commit ${target_sha} is not the current tip of ${DEFAULT_BRANCH} (${default_sha})." >&2
                      echo "This workflow pushes directly back to ${DEFAULT_BRANCH}, so it only supports releasing the current default-branch head." >&2
                      exit 1
                  fi

                  git checkout --detach "${target_sha}"

            - name: Setup Rust
              uses: ./.github/actions/setup-rust

            - name: Determine next version from tags
              id: version
              run: |
                  current_tag="$(python scripts/release.py latest-tag)"
                  current_version="$(python scripts/release.py latest-version)"
                  new_version="$(python scripts/release.py next-version "${{ inputs.bump }}")"
                  cargo update --workspace
                  echo "current_tag=${current_tag}" >> "${GITHUB_OUTPUT}"
                  echo "current_version=${current_version}" >> "${GITHUB_OUTPUT}"
                  echo "new_version=${new_version}" >> "${GITHUB_OUTPUT}"

            - name: Configure git author
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Commit release version update
              run: |
                  git add Cargo.toml Cargo.lock
                  git commit -m "chore: release v${{ steps.version.outputs.new_version }}"
                  git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"

            - name: Push release commit and tag
              env:
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
              run: |
                  git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"
                  git push origin "refs/tags/v${{ steps.version.outputs.new_version }}"

            - name: Authenticate with crates.io
              id: auth
              uses: rust-lang/crates-io-auth-action@v1

            - name: Publish crates
              env:
                  CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
              run: |
                  version="$(python scripts/release.py version)"
                  expected_tag="v${version}"

                  if [ "${expected_tag}" != "v${{ steps.version.outputs.new_version }}" ]; then
                      echo "Workspace version ${version} does not match release version ${{ steps.version.outputs.new_version }}." >&2
                      exit 1
                  fi

                  python scripts/release.py publish-order > /tmp/publish-order.txt

                  while IFS= read -r crate_name; do
                      if python scripts/release.py is-published "${crate_name}" "${version}"; then
                          echo "Skipping ${crate_name} ${version}; already published."
                          continue
                      fi

                      attempt=1
                      until cargo publish -p "${crate_name}" --locked; do
                          if [ "${attempt}" -ge 10 ]; then
                              echo "Failed to publish ${crate_name} ${version} after ${attempt} attempts." >&2
                              exit 1
                          fi

                          attempt="$((attempt + 1))"
                          sleep 30
                      done
                  done < /tmp/publish-order.txt
