name: Test
on:
    pull_request:
        types: [ labeled, synchronize, reopened ]
env:
    CARGO_TERM_COLOR: always
concurrency:
    group: test-${{ github.workflow }}-${{
        github.event.pull_request.head.repo.full_name || github.repository}}-${{
        github.head_ref || github.ref_name }}
    cancel-in-progress: true
jobs:
    debug-event:
        name: Debug Event
        runs-on: ubuntu-latest
        steps:
            - name: Print label payload
              env:
                  EVENT_ACTION: ${{ github.event.action }}
                  EVENT_LABEL_JSON: ${{ toJson(github.event.label) }}
                  PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
                  PR_LABEL_NAMES: ${{ join(github.event.pull_request.labels.*.name, ', ') }}
              run: |
                  echo "github.event.action=${EVENT_ACTION}"
                  echo "github.event.label=${EVENT_LABEL_JSON}"
                  echo "github.event.pull_request.labels=${PR_LABELS_JSON}"
                  echo "github.event.pull_request.labels.*.name=${PR_LABEL_NAMES}"

    nwnrs:
        name: Test nwnrs
        if: contains(github.event.pull_request.labels.*.name, 'nwnrs')
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.3
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs

    nwpkg:
        name: Test NWPKG
        if: contains(github.event.pull_request.labels.*.name, 'nwpkg')
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.3
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-nwpkg

    nwscript:
        name: Test NWScript
        if: contains(github.event.pull_request.labels.*.name, 'nwscript')
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.3
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-nwscript

    types:
        name: Test Types
        if: contains(github.event.pull_request.labels.*.name, 'types')
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.3
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-types
