name: CI
on:
    pull_request:
        types: [ labeled ]
env:
    CARGO_TERM_COLOR: always
concurrency:
    group: test-${{ github.workflow }}-${{
        github.event.pull_request.head.repo.full_name || github.repository}}-${{
        github.head_ref || github.ref_name }}
    cancel-in-progress: true
jobs:
    test-cli:
        name: Test CLI
        if: github.event.label.name == 'cli'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs

    test-install:
        name: Test Install
        if: github.event.label.name == 'install'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-types

    test-nwpkg:
        name: Test NWPKG
        if: github.event.label.name == 'nwpkg'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-nwpkg

    test-nwscript:
        name: Test NWScript
        if: github.event.label.name == 'nwscript'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-nwscript

    test-types:
        name: Test Types
        if: github.event.label.name == 'types'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest ] # disable for now: windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/setup-rust
            - run: cargo test -p nwnrs-types

    test-wasm:
        name: Test Wasm
        if: github.event.label.name == 'wasm'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/setup-rust
              with:
                  target: wasm32-unknown-unknown
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Install wasm-pack
              run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
            - name: Run wasm tests
              run: wasm-pack test --node wasm
