name: Dependencies

permissions:
    contents: read

on:
    pull_request:
        paths:
            - "**/Cargo.toml"
            - "deny.toml"
    push:
        paths:
            - "**/Cargo.toml"
            - "deny.toml"
        branches:
            - main

concurrency:
    group: ${{github.workflow}}-${{github.ref}}
    cancel-in-progress: ${{github.event_name == 'pull_request'}}

env:
    CARGO_TERM_COLOR: always

jobs:
    check-advisories:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Check for security advisories and unmaintained crates
              uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
              with:
                  command: check
                  command-arguments: advisories

    check-bans:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Check for banned and duplicated dependencies
              uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
              with:
                  command: check
                  command-arguments: bans

    check-licenses:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Check for unauthorized licenses
              uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
              with:
                  command: check
                  command-arguments: licenses

    check-sources:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Check for unauthorized crate sources
              uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
              with:
                  command: check
                  command-arguments: sources
