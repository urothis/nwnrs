name: Build and publish nwnrs image

on:
    workflow_dispatch:
        inputs:
            asset_root:
                description: Absolute path to the internally staged NWN install
                required: true
                type: string
            version:
                description: NWN version recorded in the generated artifact manifest
                required: true
                type: string
            channel:
                description: Image release channel
                required: true
                type: choice
                default: stable
                options:
                    - stable
                    - development
                    - preview
    workflow_call:
        inputs:
            asset_root:
                description: Absolute path to the internally staged NWN install
                required: true
                type: string
            version:
                description: NWN version recorded in the generated artifact manifest
                required: true
                type: string
            channel:
                description: Image release channel
                required: true
                type: string

concurrency:
    group: nwnrs-image-${{ inputs.channel }}
    cancel-in-progress: false

jobs:
    publish:
        name: Publish GHCR multi-architecture image
        runs-on: [self-hosted, linux, X64, nwserver-assets]
        timeout-minutes: 90
        permissions:
            contents: read
            packages: write
        steps:
            - name: Check out source
              uses: actions/checkout@v6.0.3
              with:
                  persist-credentials: false

            - name: Set up Rust
              uses: ./.github/actions/setup-rust

            - name: Build asset-preparation CLI
              run: cargo build --locked --release --package nwnrs

            - name: Generate image build identity
              id: build
              run: |
                  echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
                  echo "tag_timestamp=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_OUTPUT"

            - name: Generate manifest and prepare verified Docker context
              id: context
              env:
                  ASSET_ROOT: ${{ inputs.asset_root }}
                  ASSET_MANIFEST: ${{ runner.temp }}/nwserver-assets-${{ github.run_id }}-${{ github.run_attempt }}.json
                  NWN_VERSION: ${{ inputs.version }}
                  NWN_CHANNEL: ${{ inputs.channel }}
              run: |
                  docker/scripts/write-asset-manifest.sh \
                    "$ASSET_ROOT" \
                    "$ASSET_MANIFEST" \
                    "$NWN_VERSION" \
                    "$NWN_CHANNEL"
                  docker/scripts/prepare-context.sh \
                    "$ASSET_ROOT" \
                    "$ASSET_MANIFEST" \
                    docker/data \
                    target/release/nwnrs
                  {
                    echo "channel=$(jq -r .channel docker/data/build-info.json)"
                    echo "version=$(jq -r .version docker/data/build-info.json)"
                    echo "asset_manifest_sha256=$(jq -r .asset_manifest_sha256 docker/data/build-info.json)"
                    echo "prepared_manifest_sha256=$(jq -r .prepared_manifest_sha256 docker/data/build-info.json)"
                  } >> "$GITHUB_OUTPUT"

            - name: Log in to GHCR
              uses: docker/login-action@v3.6.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3.7.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.12.0

            - name: Generate image metadata
              id: metadata
              uses: docker/metadata-action@v6.0.0
              with:
                  images: ghcr.io/urothis/nwnrs
                  tags: |
                      type=raw,value=${{ steps.context.outputs.channel }}
                      type=raw,value=${{ steps.context.outputs.version }}-${{ steps.context.outputs.channel }}
                      type=raw,value=${{ steps.context.outputs.version }}-${{ steps.context.outputs.channel }}-${{ steps.build.outputs.tag_timestamp }}
                  labels: |
                      org.opencontainers.image.title=nwnrs
                      org.opencontainers.image.description=Supervised multi-architecture Neverwinter Nights dedicated server
                      org.opencontainers.image.created=${{ steps.build.outputs.created }}
                      org.opencontainers.image.version=${{ steps.context.outputs.version }}-${{ steps.context.outputs.channel }}-${{ steps.build.outputs.tag_timestamp }}
                      io.github.urothis.nwnrs.asset-manifest.sha256=${{ steps.context.outputs.asset_manifest_sha256 }}
                      io.github.urothis.nwnrs.prepared-manifest.sha256=${{ steps.context.outputs.prepared_manifest_sha256 }}

            - name: Build and push image
              uses: docker/build-push-action@v7.2.0
              with:
                  context: .
                  file: docker/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.metadata.outputs.tags }}
                  labels: ${{ steps.metadata.outputs.labels }}
                  build-args: |
                      NWN_VERSION=${{ steps.context.outputs.version }}
                      OCI_CREATED=${{ steps.build.outputs.created }}
                      OCI_REVISION=${{ github.sha }}
                      OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}
                      OCI_VERSION=${{ steps.context.outputs.version }}-${{ steps.context.outputs.channel }}-${{ steps.build.outputs.tag_timestamp }}
                      ASSET_MANIFEST_SHA256=${{ steps.context.outputs.asset_manifest_sha256 }}
                      PREPARED_MANIFEST_SHA256=${{ steps.context.outputs.prepared_manifest_sha256 }}
                  cache-from: type=gha,scope=nwnrs
                  cache-to: type=gha,mode=max,scope=nwnrs
                  provenance: mode=max
                  sbom: true

            - name: Remove prepared proprietary context
              if: always()
              env:
                  ASSET_MANIFEST: ${{ runner.temp }}/nwserver-assets-${{ github.run_id }}-${{ github.run_attempt }}.json
              run: rm -rf -- docker/data docker/data.lock "$ASSET_MANIFEST"
