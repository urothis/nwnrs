name: "Rust Lint"
description: "Run rustfmt, clippy, and rustdoc checks"

inputs:
  workspace:
    description: "Lint workspace"
    required: false
    default: "true"
  check-format:
    description: "Check formatting"
    required: false
    default: "true"
  clippy:
    description: "Run clippy"
    required: false
    default: "true"
  doc:
    description: "Run rustdoc lint checks"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Check formatting
      if: inputs.check-format == 'true'
      shell: bash
      run: cargo fmt --all -- --check

    - name: Run clippy
      if: inputs.clippy == 'true'
      shell: bash
      run: |
        if [ "${{ inputs.workspace }}" = "true" ]; then
          cargo clippy --workspace -- -D warnings
        else
          cargo clippy -- -D warnings
        fi

    - name: Run rustdoc checks
      if: inputs.doc == 'true'
      shell: bash
      env:
        RUSTDOCFLAGS: >-
          -D warnings
          -D rustdoc::broken_intra_doc_links
          -D rustdoc::private_intra_doc_links
          -D rustdoc::missing_crate_level_docs
          -D rustdoc::private_doc_tests
          -D rustdoc::invalid_codeblock_attributes
          -D rustdoc::invalid_html_tags
          -D rustdoc::invalid_rust_codeblocks
          -D rustdoc::bare_urls
          -D rustdoc::unescaped_backticks
          -D rustdoc::redundant_explicit_links
          -Zcrate-attr=feature(rustdoc_missing_doc_code_examples)
          -D rustdoc::missing_doc_code_examples
      run: |
        if [ "${{ inputs.workspace }}" = "true" ]; then
          cargo doc --workspace --no-deps
        else
          cargo doc --no-deps
        fi
