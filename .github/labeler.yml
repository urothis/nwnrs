# Labeler configuration for automatic PR labeling
# This file defines rules for automatically applying labels to pull requests
# based on the files that are modified.

# CLI changes
cli:
  - changed-files:
      - any-glob-to-any-file: ["cli/**/*"]

# Individual crate changes
checksums:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/checksums/**/*"]

compressedbuf:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/compressedbuf/**/*"]

localization:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/localization/**/*"]

erf:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/erf/**/*"]

exo:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/exo/**/*"]

install:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/install/**/*"]

encoding:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/encoding/**/*"]

gff:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/gff/**/*"]

dds:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/dds/**/*"]

git:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/git/**/*"]

gffjson:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/gffjson/**/*"]

key:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/key/**/*"]

lru:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/lru/**/*"]

masterlist:
  - changed-files:
      - any-glob-to-any-file: ["crates/meta/masterlist/**/*"]

prelude:
  - changed-files:
      - any-glob-to-any-file: ["crates/meta/prelude/**/*"]

nwscript:
  - changed-files:
      - any-glob-to-any-file: ["crates/language/nwscript/**/*"]

mdl:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/mdl/**/*"]

mtr:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/mtr/**/*"]

nwsync:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/nwsync/**/*"]

plt:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/plt/**/*"]

set:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/set/**/*"]

tga:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/tga/**/*"]

txi:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/txi/**/*"]

resdir:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/resdir/**/*"]

resfile:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/resfile/**/*"]

resman:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/resman/**/*"]

resmemfile:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/resmemfile/**/*"]

resnwsync:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/resnwsync/**/*"]

resref:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/resref/**/*"]

restype:
  - changed-files:
      - any-glob-to-any-file: ["crates/resources/restype/**/*"]

ssf:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/ssf/**/*"]

streamext:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/streamext/**/*"]

tlk:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/tlk/**/*"]

twoda:
  - changed-files:
      - any-glob-to-any-file: ["crates/formats/twoda/**/*"]

io:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/io/**/*"]

test-support:
  - changed-files:
      - any-glob-to-any-file: ["crates/foundation/test-support/**/*"]

# Assets
assets:
  - changed-files:
      - any-glob-to-any-file: ["assets/**/*"]

# WASM bindings
wasm:
  - changed-files:
      - any-glob-to-any-file: ["wasm/**/*"]

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          [
            "**/README.md",
            "docs/**/*",
            "**/*.md",
            "CODE_OF_CONDUCT",
            "LICENSE",
            "CODEOWNERS",
          ]

# CI/CD and GitHub Actions
ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          [
            ".github/workflows/**/*",
            ".github/actions/**/*",
            ".github/labeler.yml",
            ".github/dependabot.yml",
          ]

# Dependencies
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          ["Cargo.toml", "Cargo.lock", "cli/Cargo.toml", "crates/*/*/Cargo.toml", "wasm/Cargo.toml"]

# Tests
tests:
  - changed-files:
      - any-glob-to-any-file: ["**/*test*.rs", "**/tests/**/*"]

# Configuration files
config:
  - changed-files:
      - any-glob-to-any-file:
          [".gitignore", "rustfmt.toml", "clippy.toml", "deny.toml", "rust-toolchain.toml"]

# Breaking changes (files that might indicate breaking changes)
breaking:
  - changed-files:
      - any-glob-to-any-file:
          ["**/src/lib.rs", "**/src/main.rs", "Cargo.toml", "cli/Cargo.toml"]
